<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>anny-js — live pose demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; overflow: hidden; color: #ccc; font: 13px monospace; }
    #status { position: fixed; top: 6px; left: 50%; transform: translateX(-50%); color: #0f0; z-index: 10; }
    #rec { position: fixed; bottom: 30px; right: 12px; z-index: 20; padding: 6px 14px;
           background: #c00; color: #fff; border: none; border-radius: 4px; font: 13px monospace; cursor: pointer; }
    #rec.recording { background: #600; animation: blink 1s step-start infinite; }
    @keyframes blink { 50% { opacity: 0.4; } }
    #cam { position: fixed; top: 0; left: 0; width: 220px; height: 165px; opacity: 0.4; transform: scaleX(-1); z-index: 3; }
    #gl  { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
    #c   { position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; background: transparent; }
  </style>
</head>
<body>
  <div id="status">Initialising…</div>
  <button id="rec">⏺ REC</button>
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="gl"></canvas>
  <canvas id="c"></canvas>

  <script type="module">
    import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";
    import {
      loadAnnyModel,
      forwardKinematics, allocBoneTransforms, identityDeltas,
      lbs, allocVertexBuffer,
      buildBoneIndex, landmarksToPoseDeltas,
      // renderAnny,  // replaced by WebGL glView()
    } from "https://cdn.jsdelivr.net/npm/anny-js/dist/index.js";

    const W = window.innerWidth, H = window.innerHeight;
    const canvas = document.getElementById("c");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    const video = document.getElementById("cam");
    const statusEl = document.getElementById("status");

    // ── 1. Load Anny model ──────────────────────────────────────────────
    const t0 = performance.now();
    const model = await loadAnnyModel("https://cdn.jsdelivr.net/npm/anny-js/assets/anny_model.json", "https://cdn.jsdelivr.net/npm/anny-js/assets/anny_model.bin");
    statusEl.textContent = `Anny loaded ${(performance.now()-t0).toFixed(0)} ms — starting camera…`;

    const boneIndex    = buildBoneIndex(model);
    const boneXforms   = allocBoneTransforms(model.boneCount);
    const vertBuf      = allocVertexBuffer(model);

    // ── 2. MediaPipe PoseLandmarker ────────────────────────────────────
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    const landmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU",
      },
      runningMode: "VIDEO",
      numPoses: 1,
    });
    statusEl.textContent = "MediaPipe ready — requesting camera…";

    // ── 3. Webcam ───────────────────────────────────────────────────────
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    await new Promise(r => video.addEventListener("loadeddata", r, { once: true }));
    statusEl.textContent = "✓ Live — move to drive Anny";

    // ── 4. WebGL setup ─────────────────────────────────────────────────
    const glCanvas = document.getElementById("gl");
    glCanvas.width = W; glCanvas.height = H;
    const gl = glCanvas.getContext("webgl", { alpha: true, antialias: true, depth: true });

    // GPU info
    const dbgExt = gl.getExtension("WEBGL_debug_renderer_info");
    const gpuName = dbgExt ? gl.getParameter(dbgExt.UNMASKED_RENDERER_WEBGL) : "unknown";
    console.log("[GPU]", gpuName);
    statusEl.textContent = `✓ Live — GPU: ${gpuName.substring(0,40)}`;

    const vertSrc = `
      attribute vec3 aPos;
      uniform float uScale, uCx, uFootY, uXSign, uCosY, uSinY, uCosX, uSinX;
      uniform vec2 uVP;
      varying float vDepth;
      varying float vHeight;
      void main() {
        float rx = aPos.x*uCosY - aPos.y*uSinY;
        float ry = aPos.x*uSinY + aPos.y*uCosY;
        float rz = ry*uSinX + aPos.z*uCosX;
        float rd = ry*uCosX - aPos.z*uSinX;
        float px = uCx + uXSign*rx*uScale;
        float py = uFootY - rz*uScale;
        vDepth  = rd;                    // depth: negative = toward viewer
        vHeight = aPos.z;                // world-space height for top-lighting
        gl_Position = vec4(px/uVP.x*2.0-1.0, 1.0-py/uVP.y*2.0, rd/5.0, 1.0);
      }`;
    // Simple shading: top-lit (height) + front-lit (depth), no extension needed.
    const fragSrc = `
      precision mediump float;
      uniform vec4 uColor;
      varying float vDepth;
      varying float vHeight;
      void main() {
        float topLight   = 0.4 + 0.6 * clamp(vHeight / 1.8, 0.0, 1.0);
        float frontLight = 0.5 + 0.5 * clamp(-vDepth * 1.5, 0.0, 1.0);
        float brightness = topLight * 0.5 + frontLight * 0.5;
        gl_FragColor = vec4(uColor.rgb * brightness, uColor.a);
      }`;

    const compile = (type, src) => {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
        console.error("Shader compile error:", gl.getShaderInfoLog(s), "\n---\n", src);
      return s;
    };
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
    // Log link errors
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
      console.error("Shader link error:", gl.getProgramInfoLog(prog));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const aPos  = gl.getAttribLocation(prog, "aPos");
    const uLocs = {};
    for (const n of ["uScale","uCx","uFootY","uXSign","uCosY","uSinY","uCosX","uSinX","uVP","uColor"])
      uLocs[n] = gl.getUniformLocation(prog, n);

    // Static face index buffer (Uint16 — max vertex index 13717 < 65535)
    const idxBuf = gl.createBuffer();
    const faces16 = new Uint16Array(model.faces.length);
    for (let i = 0; i < model.faces.length; i++) faces16[i] = model.faces[i];
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, faces16, gl.STATIC_DRAW);

    // Dynamic vertex position buffer (updated each frame after LBS)
    const vtxBufGL = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vtxBufGL);
    gl.bufferData(gl.ARRAY_BUFFER, model.vertCount * 12, gl.DYNAMIC_DRAW);

    gl.enable(gl.DEPTH_TEST);
    gl.enable(gl.CULL_FACE);
    gl.cullFace(gl.BACK);
    gl.frontFace(gl.CCW);  // standard: CCW in NDC = front-facing
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    function glView(cx, footY, scale, xSign, rotY, rotX, r, g, b) {
      gl.uniform1f(uLocs.uScale, scale);
      gl.uniform1f(uLocs.uCx,    cx);
      gl.uniform1f(uLocs.uFootY, footY);
      gl.uniform1f(uLocs.uXSign, xSign);
      gl.uniform1f(uLocs.uCosY,  Math.cos(rotY));
      gl.uniform1f(uLocs.uSinY,  Math.sin(rotY));
      gl.uniform1f(uLocs.uCosX,  Math.cos(rotX));
      gl.uniform1f(uLocs.uSinX,  Math.sin(rotX));
      gl.uniform4f(uLocs.uColor, r, g, b, 1.0);
      gl.drawElements(gl.TRIANGLES, model.faceCount * 3, gl.UNSIGNED_SHORT, 0);
    }

    // ── 5. Render loop ──────────────────────────────────────────────────
    let lastLm = null;
    let smoothLm = null;   // EMA-smoothed landmarks — kills pose jitter
    let lastTs = -1;
    let frameCount = 0, fpsTs = performance.now(), fps = 0;

    // Pose landmark smoothing (separate from position smoothing)
    const LM_S = 0.5;    // landmark EMA — responsive, light jitter damping

    // Smoothed position/scale/twist
    let sCx = W / 2, sScale = 280, sFootY = H * 0.88, sTwist = 0;
    const SMOOTH = 0.25;

    let lastFrame = 0;
    function tick() {
      requestAnimationFrame(tick);
      const now = performance.now();
      if (now - lastFrame < 16) return;  // cap at ~60fps max
      lastFrame = now;

      // Run MediaPipe (VIDEO mode: only if timestamp advanced)
      if (video.readyState >= 2 && now !== lastTs) {
        lastTs = now;
        const result = landmarker.detectForVideo(video, now);
        if (result.landmarks.length > 0) {
          lastLm = result.landmarks[0];
          // EMA smooth the raw landmarks to kill per-frame jitter
          if (!smoothLm) {
            smoothLm = lastLm.map(lm => ({...lm}));
          } else {
            for (let i = 0; i < lastLm.length; i++) {
              smoothLm[i].x += (lastLm[i].x - smoothLm[i].x) * LM_S;
              smoothLm[i].y += (lastLm[i].y - smoothLm[i].y) * LM_S;
              smoothLm[i].z = (smoothLm[i].z ?? 0) + ((lastLm[i].z ?? 0) - (smoothLm[i].z ?? 0)) * LM_S;
              smoothLm[i].visibility = (smoothLm[i].visibility ?? 1) + ((lastLm[i].visibility ?? 1) - (smoothLm[i].visibility ?? 1)) * LM_S;
            }
          }
        }
      }

      // FPS counter
      frameCount++;
      if (now - fpsTs >= 1000) {
        fps = frameCount; frameCount = 0; fpsTs = now;
      }

      // Clear
      ctx.fillStyle = "#0a0a0f";
      ctx.fillRect(0, 0, W, H);

      if (!smoothLm) {
        ctx.fillStyle = "#555";
        ctx.font = "18px monospace";
        ctx.fillText("Stand in front of the camera…", W/2 - 160, H/2);
        return;
      }

      // ── Pose: use smoothed landmarks to reduce jitter ──
      const t1 = performance.now();
      const deltas = landmarksToPoseDeltas(smoothLm, model, boneIndex, /*mirrorX=*/false);
      forwardKinematics(model, deltas, boneXforms);
      const mesh = lbs(model, boneXforms, vertBuf);
      const poseMs = (performance.now() - t1).toFixed(1);

      // ── Scale from shoulder width; cx from shoulder midpoint (stable) ──
      const lS = smoothLm[11], rS = smoothLm[12];
      const torsoW = Math.abs(lS.x - rS.x);
      const rawScale = torsoW > 0.02 ? (torsoW * W) / 0.42 : sScale;
      const shoulderY = ((lS.y + rS.y) / 2) * H;
      const rawFootY  = shoulderY + 1.35 * rawScale;
      const clampedScale = rawFootY > H - 20 ? (H - 20 - shoulderY) / 1.35 : rawScale;

      sCx    += (((lS.x + rS.x) / 2) * W   - sCx)    * SMOOTH;
      sScale += (clampedScale               - sScale) * SMOOTH;
      sFootY += (shoulderY + 1.35 * sScale  - sFootY) * SMOOTH;

      // Hip twist
      const lH = smoothLm[23], rH = smoothLm[24];
      const hipDx = Math.abs(lH.x - rH.x) || 0.01;
      const rawTwist = Math.atan2((lH.z ?? 0) - (rH.z ?? 0), hipDx) * 0.35;
      sTwist += (rawTwist - sTwist) * SMOOTH;

      // ── WebGL: 4 views — 4 draw calls total ────────────────────────────
      const HW = W / 2, HH = H / 2;
      const vs = Math.min(sScale * 0.42, HH * 0.82 / 1.7);
      const vt = sTwist;
      const bodyH = 1.7 * vs;

      // Upload posed vertices to GPU (dynamic each frame)
      gl.bindBuffer(gl.ARRAY_BUFFER, vtxBufGL);
      gl.bufferSubData(gl.ARRAY_BUFFER, 0, mesh.vertices);
      gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
      gl.enableVertexAttribArray(aPos);
      gl.uniform2f(uLocs.uVP, W, H);

      gl.clearColor(0.04, 0.04, 0.06, 1);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

      // CW winding = front face (matches Anny mesh + our culling convention)
      glView(HW*0.5,  HH*0.1+bodyH,       vs,     -1, vt,                0,   0.29, 0.61, 1.0);  // FRONT blue
      glView(HW*1.5,  HH*0.1+bodyH,       vs,     -1, Math.PI+vt,        0,   1.0,  0.55, 0.29); // BACK  orange
      glView(HW*0.5,  HH+HH*0.1+bodyH,    vs,     -1, Math.PI*0.35+vt,   0,   0.29, 1.0,  0.54); // 3/4   green
      glView(HW*1.5,  HH+HH*0.55,         vs*0.6,  1, vt,               0.9,  0.85, 0.29, 1.0);  // ABOVE purple

      // ── 2D canvas: background + dividers + labels only ────────────────
      ctx.fillStyle = "transparent";
      ctx.clearRect(0, 0, W, H);

      // Dividing lines
      ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(HW, 0); ctx.lineTo(HW, H);
      ctx.moveTo(0, HH); ctx.lineTo(W, HH);
      ctx.stroke();

      const label = (txt, qx, qy) => {
        ctx.fillStyle = "rgba(255,255,255,0.45)";
        ctx.font = "11px monospace";
        ctx.fillText(txt, qx + 8, qy + 16);
      };
      label("FRONT", 0, 0); label("BACK", HW, 0);
      label("3/4",   0, HH); label("ABOVE", HW, HH);

      // ── Overlay: mini landmark skeleton (for debugging) ──
      const LW = 160, LH = 120;  // landmark preview size
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = "#0f0";
      ctx.lineWidth = 1.5;
      const lx = (i) => 8 + lastLm[i].x * LW;
      const ly = (i) => 8 + lastLm[i].y * LH;
      const bone = (a, b) => {
        ctx.beginPath(); ctx.moveTo(lx(a), ly(a)); ctx.lineTo(lx(b), ly(b)); ctx.stroke();
      };
      // torso
      bone(11,12); bone(11,23); bone(12,24); bone(23,24);
      // arms
      bone(11,13); bone(13,15); bone(12,14); bone(14,16);
      // legs
      bone(23,25); bone(25,27); bone(24,26); bone(26,28);
      ctx.globalAlpha = 1;
      ctx.restore();

      // ── Stats ──
      ctx.fillStyle = "#4f4";
      ctx.font = "12px monospace";
      ctx.fillText(`FK+LBS ${poseMs} ms   ${fps} fps`, 10, H - 10);
    }

    tick();

    // ── Canvas recording ────────────────────────────────────────────────
    // Captures the WebGL canvas to a WebM file — no screen capture needed.
    const recBtn = document.getElementById("rec");
    let recorder = null, recChunks = [];

    recBtn.addEventListener("click", () => {
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        return;
      }
      // Combine WebGL canvas + 2D overlay into one stream
      const streams = [glCanvas.captureStream(30), canvas.captureStream(30)];
      // Merge on an offscreen canvas
      const merge = document.createElement("canvas");
      merge.width = W; merge.height = H;
      const mctx = merge.getContext("2d");
      const mergeStream = merge.captureStream(30);
      (function drawMerge() {
        if (!recorder || recorder.state !== "recording") return;
        mctx.drawImage(glCanvas, 0, 0);
        mctx.drawImage(canvas, 0, 0);
        requestAnimationFrame(drawMerge);
      })();

      recChunks = [];
      recorder = new MediaRecorder(mergeStream, { mimeType: "video/webm;codecs=vp9", videoBitsPerSecond: 8_000_000 });
      recorder.ondataavailable = e => { if (e.data.size) recChunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(recChunks, { type: "video/webm" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = `anny-${Date.now()}.webm`; a.click();
        URL.revokeObjectURL(url);
        recBtn.textContent = "⏺ REC";
        recBtn.classList.remove("recording");
      };
      recorder.start();
      requestAnimationFrame(drawMerge);
      recBtn.textContent = "⏹ STOP";
      recBtn.classList.add("recording");
    });
  </script>
</body>
</html>
