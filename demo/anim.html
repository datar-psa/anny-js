<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>anny-js — animation demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c0c12; color: #ccc; font: 13px/1.5 system-ui; overflow: hidden; }
    canvas { display: block; }
    #glc, #ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
    #glc { z-index: 1; }
    #ui  { z-index: 2; pointer-events: none; }
    #brand { position: fixed; top: 14px; left: 18px; z-index: 3; pointer-events: none; }
    #brand h1 { font: 600 16px system-ui; color: #fff; letter-spacing: .05em; }
    #brand h1 span { color: #4af; }
    #stats { position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
             font: 11px monospace; color: #4a4; z-index: 3; pointer-events: none; }
    #pose  { position: fixed; top: 14px; right: 18px;
             font: 12px monospace; color: #a94; z-index: 3; pointer-events: none; }
    #footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 3;
      display: flex; justify-content: space-between; align-items: flex-end;
      padding: 12px 18px; pointer-events: none;
      background: linear-gradient(transparent, rgba(0,0,0,.6));
    }
    #footer p  { font: 11px/1.4 system-ui; color: rgba(255,255,255,.35); max-width: 520px; }
    #footer nav { display: flex; gap: 14px; }
    #footer a  { font: 11px monospace; color: rgba(100,180,255,.7);
                 text-decoration: none; pointer-events: all; }
    #footer a:hover { color: #4af; }
  </style>
</head>
<body>
<canvas id="glc"></canvas>
<div id="brand"><h1><span>anny</span>-js</h1></div>
<div id="stats">loading…</div>
<div id="pose">—</div>
<div id="footer">
  <p>Live 3D body animation in the browser — FK&thinsp;+&thinsp;LBS on a 14&thinsp;718-vertex&thinsp;/&thinsp;163-bone mesh in &lt;&thinsp;2&thinsp;ms. Powered by <a href="https://github.com/naver/anny" target="_blank" rel="noopener">Anny</a> (Apache&thinsp;2.0).</p>
  <nav>
    <a href="https://github.com/datar-psa/anny-js" target="_blank" rel="noopener">GitHub</a>
    <a href="https://www.npmjs.com/package/anny-js" target="_blank" rel="noopener">npm</a>
    <a href="/demo/mediapipe" target="_blank" rel="noopener">📷 Live demo</a>
  </nav>
</div>

<script type="module">
import {
  loadAnnyModel,
  forwardKinematics, allocBoneTransforms, identityDeltas, setDeltas,
  lbs, allocVertexBuffer, buildBoneIndex, rodriguesToMat3, rotFromTo,
} from '../dist/index.js';

const W = window.innerWidth, H = window.innerHeight;
const statsEl = document.getElementById('stats');
const poseEl  = document.getElementById('pose');

// ── Load model ──────────────────────────────────────────────────────────────
const model = await loadAnnyModel('../assets/anny_model.json', '../assets/anny_model.bin');
statsEl.textContent = 'model ready';

const boneIndex  = buildBoneIndex(model);
const boneXforms = allocBoneTransforms(model.boneCount);
const vertBuf    = allocVertexBuffer(model);

// ── WebGL ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('glc');
canvas.width = W; canvas.height = H;
const gl = canvas.getContext('webgl', { antialias: true, depth: true });

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
// ── Body shader — face normals via derivatives for proper 3D lighting ─────────
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, `
  attribute vec3 aPos;
  uniform float uSc,uCx,uFy,uXs,uCY,uSY,uCX,uSX,uWX,uWS;
  uniform vec2 uVP;
  varying vec3 vViewPos;   // view-space position for normal derivatives
  varying float vH, vD;   // height + depth fallback shading
  void main(){
    float py=aPos.y*uWX-aPos.z*uWS, pz=aPos.y*uWS+aPos.z*uWX;
    float rx=aPos.x*uCY-py*uSY, ry=aPos.x*uSY+py*uCY;
    float rz=ry*uSX+pz*uCX, rd=ry*uCX-pz*uSX;
    float sx=uCx+uXs*rx*uSc, sy=uFy-rz*uSc;
    vViewPos=vec3(sx, sy, rd*uSc);
    vH=pz; vD=rd;
    gl_Position=vec4(sx/uVP.x*2.-1., 1.-sy/uVP.y*2., rd/5.,1.);
  }`));
// Try derivative-based normals (GPU Chrome); falls back gracefully if extension absent
const hasDerivatives = !!gl.getExtension('OES_standard_derivatives');
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, hasDerivatives ? `
  #extension GL_OES_standard_derivatives : enable
  precision mediump float;
  uniform vec4 uCol;
  varying vec3 vViewPos;
  varying float vH, vD;
  void main(){
    vec3 n = normalize(cross(dFdx(vViewPos), dFdy(vViewPos)));
    float key  = max(dot(n, normalize(vec3( 0.3,-0.8, 0.6))), 0.0);
    float fill = max(dot(n, normalize(vec3( 0.8, 0.2, 0.3))), 0.0);
    float rim  = max(dot(n, normalize(vec3(-0.2, 0.6,-0.8))), 0.0);
    float lit  = 0.28 + 0.52*key + 0.14*fill + 0.06*rim*rim;
    gl_FragColor = vec4(uCol.rgb * lit, 1.0);
  }` : `
  precision mediump float;
  uniform vec4 uCol;
  varying float vH, vD;
  void main(){
    float top   = 0.35 + 0.65*clamp(vH/1.8, 0.0, 1.0);
    float front = 0.50 + 0.50*clamp(-vD*1.4, 0.0, 1.0);
    gl_FragColor = vec4(uCol.rgb*(top*0.5+front*0.5), 1.0);
  }`));
gl.linkProgram(prog); gl.useProgram(prog);

const aPos=gl.getAttribLocation(prog,'aPos');
const U={};
for(const n of['uSc','uCx','uFy','uXs','uCY','uSY','uCX','uSX','uWX','uWS','uVP','uCol'])
  U[n]=gl.getUniformLocation(prog,n);

// ── Grid shader ────────────────────────────────────────────────────────────────
const gridProg = gl.createProgram();
gl.attachShader(gridProg, compileShader(gl.VERTEX_SHADER, `
  attribute vec3 aPos;
  uniform float uSc,uCx,uFy,uXs,uCY,uSY,uCX,uSX;  // no world flip — grid is static
  uniform vec2 uVP;
  void main(){
    // Grid always at Z=0 — only camera orbit + tilt, no body-flip
    float rx=aPos.x*uCY-aPos.y*uSY, ry=aPos.x*uSY+aPos.y*uCY;
    float rz=ry*uSX+aPos.z*uCX, rd=ry*uCX-aPos.z*uSX;
    gl_Position=vec4((uCx+uXs*rx*uSc)/uVP.x*2.-1.,1.-(uFy-rz*uSc)/uVP.y*2.,rd/5.+0.001,1.);
  }`));
gl.attachShader(gridProg, compileShader(gl.FRAGMENT_SHADER, `
  precision mediump float;
  uniform float uAlpha;
  void main(){ gl_FragColor=vec4(0.32,0.32,0.38,uAlpha); }`));
gl.linkProgram(gridProg);
const gULocs={};
for(const n of['uSc','uCx','uFy','uXs','uCY','uSY','uCX','uSX','uVP','uAlpha'])
  gULocs[n]=gl.getUniformLocation(gridProg,n);
const gAPos=gl.getAttribLocation(gridProg,'aPos');

// Build floor grid geometry (Z=0 plane, lines from -1.2 to 1.2 in X and Y)
const gridVerts=[], gridCount=20, gridRange=1.4, gridStep=gridRange*2/gridCount;
for(let i=0;i<=gridCount;i++){
  const v=-gridRange+i*gridStep;
  gridVerts.push(v,  -gridRange, 0, v,   gridRange, 0);  // X lines
  gridVerts.push(-gridRange, v, 0,  gridRange, v, 0);    // Y lines
}
const gridBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,gridBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(gridVerts),gl.STATIC_DRAW);

const idxBuf=gl.createBuffer();
const f16=new Uint16Array(model.faces.length);
for(let i=0;i<model.faces.length;i++) f16[i]=model.faces[i];
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,f16,gl.STATIC_DRAW);

const vtxBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,vtxBuf);
gl.bufferData(gl.ARRAY_BUFFER,model.vertCount*12,gl.DYNAMIC_DRAW);

gl.enable(gl.DEPTH_TEST); gl.enable(gl.CULL_FACE);
gl.cullFace(gl.BACK); gl.frontFace(gl.CCW);

// worldFlip: set once per frame before drawing all views
let _wx=1, _ws=0;
function setWorldFlip(angle){ _wx=Math.cos(angle); _ws=Math.sin(angle); }

function applyProjection(locs, cx,fy,sc,xs,camY,camX){
  gl.uniform1f(locs.uSc,sc); gl.uniform1f(locs.uCx,cx); gl.uniform1f(locs.uFy,fy);
  gl.uniform1f(locs.uXs,xs);
  gl.uniform1f(locs.uCY,Math.cos(camY)); gl.uniform1f(locs.uSY,Math.sin(camY));
  gl.uniform1f(locs.uCX,Math.cos(camX)); gl.uniform1f(locs.uSX,Math.sin(camX));
  gl.uniform1f(locs.uWX,_wx); gl.uniform1f(locs.uWS,_ws);
  gl.uniform2f(locs.uVP,W,H);
}

function gridView(cx,fy,sc,xs,camY,camX){
  gl.useProgram(gridProg);
  // Grid: camera transforms only — no world flip
  gl.uniform1f(gULocs.uSc,sc); gl.uniform1f(gULocs.uCx,cx); gl.uniform1f(gULocs.uFy,fy);
  gl.uniform1f(gULocs.uXs,xs);
  gl.uniform1f(gULocs.uCY,Math.cos(camY)); gl.uniform1f(gULocs.uSY,Math.sin(camY));
  gl.uniform1f(gULocs.uCX,Math.cos(camX)); gl.uniform1f(gULocs.uSX,Math.sin(camX));
  gl.uniform2f(gULocs.uVP,W,H);
  gl.uniform1f(gULocs.uAlpha,0.5);
  gl.bindBuffer(gl.ARRAY_BUFFER,gridBuf);
  gl.vertexAttribPointer(gAPos,3,gl.FLOAT,false,0,0);
  gl.enableVertexAttribArray(gAPos);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,null);
  gl.drawArrays(gl.LINES,0,gridVerts.length/3);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
}

function view(cx,fy,sc,xs,camY,camX,r,g,b){
  gl.useProgram(prog);
  applyProjection(U,cx,fy,sc,xs,camY,camX);
  gl.uniform4f(U.uCol,r,g,b,1);
  gl.bindBuffer(gl.ARRAY_BUFFER,vtxBuf);
  gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);
  gl.enableVertexAttribArray(aPos);
  gl.drawElements(gl.TRIANGLES,model.faceCount*3,gl.UNSIGNED_SHORT,0);
}

// ── Layout: body centred in each quadrant with equal margin top/bottom ─────────
const HW = W/2, HH = H/2;
const sc = Math.min(HH * 0.74 / 1.7, HW * 0.55 / 0.42);
// Compute actual foot level: min Z in the rest mesh (may be slightly below 0)
let minRestZ = 0;
for (let i = 2; i < model.restVertices.length; i += 3)
  if (model.restVertices[i] < minRestZ) minRestZ = model.restVertices[i];

// Body height in pixels and grid anchor (Z=0 = world floor)
const bh     = 1.7 * sc;
const margin = (HH - bh) * 0.45;   // slight upward bias
const fyTop  = margin + bh;          // canvas Y of Z=0 floor (top half)
const fyBot  = HH + margin + bh;     // same for bottom half

// Body must shift so actual feet (at Z=minRestZ) land at the grid (Z=0 = fyTop).
// canvas_y(feet) = bodyFootY - minRestZ*sc = fyTop  →  bodyFootY = fyTop + minRestZ*sc
const bfTop = fyTop + minRestZ * sc;
const bfBot = fyBot + minRestZ * sc;

// ── Pose helpers ─────────────────────────────────────────────────────────────
const deg = a => a * Math.PI / 180;
const rotZ = a => rodriguesToMat3(new Float32Array([0,0,1]),a);
const rotX = a => rodriguesToMat3(new Float32Array([1,0,0]),a);
const rotY = a => rodriguesToMat3(new Float32Array([0,1,0]),a);

// Aim a bone's local +Y axis (the bone direction in Blender convention) at the
// given world-space direction. Returns a local delta rotation (3×3 row-major).
// Used for arms — their local axes are not aligned with world axes, so single-axis
// rotZ/rotX cannot produce shoulder flexion (forward arm swing).
const Y_UNIT = new Float32Array([0, 1, 0]);
function aimAt(boneName, worldDir) {
  const idx = model.boneLabels.indexOf(boneName);
  if (idx < 0) return new Float32Array([1,0,0, 0,1,0, 0,0,1]);
  const b = idx * 16;
  const R = model.restBonePoses;
  // local = R^T · worldDir  (transpose because R is rest-bone world rotation)
  const lx = R[b  ]*worldDir[0] + R[b+4]*worldDir[1] + R[b+ 8]*worldDir[2];
  const ly = R[b+1]*worldDir[0] + R[b+5]*worldDir[1] + R[b+ 9]*worldDir[2];
  const lz = R[b+2]*worldDir[0] + R[b+6]*worldDir[1] + R[b+10]*worldDir[2];
  const n = Math.hypot(lx, ly, lz) || 1;
  return rotFromTo(Y_UNIT, new Float32Array([lx/n, ly/n, lz/n]));
}

// Blend several world directions by weight. Result need not be unit-length —
// aimAt normalises it. Weights are clamped non-negative; if all weights are
// zero, the rest direction is used.
function blendDirs(rest, weighted) {
  let x = 0, y = 0, z = 0, w = 0;
  for (const [wi, d] of weighted) {
    if (wi <= 0) continue;
    x += wi*d[0]; y += wi*d[1]; z += wi*d[2]; w += wi;
  }
  if (w < 1) { const rw = 1 - w; x += rw*rest[0]; y += rw*rest[1]; z += rw*rest[2]; }
  return [x, y, z];
}

// Salto phases (0..1)
// 0.00–0.10  stand
// 0.10–0.22  crouch / load (knees bend, arms swing back & up)
// 0.22–0.30  launch (legs explode, arms whip up, slight back arch)
// 0.30–0.42  gather to tuck (knees rise, arms reach for shins)
// 0.42–0.62  full tuck (ball shape — flip rotation does its work here)
// 0.62–0.72  open (legs extend, arms out for balance)
// 0.72–0.86  land crouch (absorb impact)
// 0.86–1.00  recover to stand

const smooth  = t => t*t*(3-2*t);
const clamp01 = t => Math.max(0, Math.min(1, t));
const phase   = (t, a, b) => smooth(clamp01((t-a)/(b-a)));

// Arm direction key-poses (world space, Anny convention: X=anatomical-left,
// Y=anatomical-POSTERIOR (+Y=behind body), Z=up — see mediapipe.ts: "Anny front=-Y").
// Upper arm points along its length; elbow-flex of the forearm folds the hand
// back, so the upper arm should be aimed where we want the ELBOW, not the hand.
const ARM_REST_L  = [ 0.73, 0.00, -0.69];   // A-pose (matches localY in rest)
const ARM_REST_R  = [-0.73, 0.00, -0.69];
const ARM_BACK_L  = [ 0.45, 0.35, -0.82];   // windup: down and behind body (+Y)
const ARM_BACK_R  = [-0.45, 0.35, -0.82];
const ARM_UP_L    = [ 0.30, 0.00,  0.95];   // overhead
const ARM_UP_R    = [-0.30, 0.00,  0.95];
const ARM_TUCK_L  = [ 0.18,-0.70, -0.70];   // forward and 45° down — elbow flex puts hand at shin
const ARM_TUCK_R  = [-0.18,-0.70, -0.70];
const ARM_OPEN_L  = [ 0.92,-0.20, -0.34];   // T-out (slight forward) for landing balance
const ARM_OPEN_R  = [-0.92,-0.20, -0.34];

function makeSaltoPose(t) {
  const d = identityDeltas(model.boneCount);

  // ── Phase amplitudes (0..1) ─────────────────────────────────────────────
  // Tuck releases sharply (0.55→0.60) so the body un-curls cleanly into the
  // open pose, instead of lingering in a "ski-jumper" half-crouch as it falls.
  // The flip rotation still finishes at 0.75 — that gives ~0.15 of "clean
  // T-shape descent" where the legs are straight, ready to receive the landing.
  const crouch    = phase(t, 0.10, 0.22) - phase(t, 0.22, 0.30)
                  + phase(t, 0.74, 0.84) - phase(t, 0.92, 1.00);
  const launch    = phase(t, 0.22, 0.30) * (1 - phase(t, 0.30, 0.38));
  const tuck      = phase(t, 0.32, 0.44) * (1 - phase(t, 0.55, 0.60));
  const armsBack  = phase(t, 0.10, 0.20) * (1 - phase(t, 0.20, 0.28));
  const armsUp    = phase(t, 0.20, 0.30) * (1 - phase(t, 0.32, 0.42));
  const armsOpen  = phase(t, 0.55, 0.62) * (1 - phase(t, 0.82, 0.92));

  // Sign convention (from rest-pose analysis at the file head):
  //   upperleg.local_X ≈ +world_X → +rotX = hip EXTENSION (leg back). Flex = NEGATIVE.
  //   lowerleg.local_X ≈ +world_X → +rotX = knee flex (heel toward butt).
  //   lowerarm.local_X ≈ elbow flex axis → +rotX = elbow flex (hand toward shoulder).
  //   spine*.local_X  = +world_X → +rotX = forward bend (crunch curl).
  const tuckHip   = -tuck * 130;   // deep hip flex (knees-to-chest)
  const tuckKnee  =  tuck * 145;   // deep knee flex (heels-to-butt)
  const tuckElbow =  tuck * 105;   // elbow flex — combines with diagonal upper-arm aim to put hands on shins

  // Arms: blend world-space target directions per phase, then aim local Y at it.
  const armDirL = blendDirs(ARM_REST_L, [
    [armsBack, ARM_BACK_L], [armsUp, ARM_UP_L],
    [tuck,     ARM_TUCK_L], [armsOpen, ARM_OPEN_L],
  ]);
  const armDirR = blendDirs(ARM_REST_R, [
    [armsBack, ARM_BACK_R], [armsUp, ARM_UP_R],
    [tuck,     ARM_TUCK_R], [armsOpen, ARM_OPEN_R],
  ]);

  setDeltas(d, model, [
    // ── Legs ──────────────────────────────────────────────────────────────
    // Hip: NEGATIVE rotX = forward flex (knees forward over toes — proper squat).
    //   crouch+land:  knees forward, butt slightly down (athletic absorb)
    //   launch:       slight back-drive (+) for jump preload
    //   tuck:         deep flex (knees to chest)
    { bone: 'upperleg01.L', rot: rotX(deg(-5 - crouch*32 + launch*8 + tuckHip)) },
    { bone: 'upperleg01.R', rot: rotX(deg(-5 - crouch*32 + launch*8 + tuckHip)) },
    // Knee: deep flex in tuck and crouch (+rotX = flex on lowerleg).
    { bone: 'lowerleg01.L', rot: rotX(deg(crouch*55 + tuckKnee)) },
    { bone: 'lowerleg01.R', rot: rotX(deg(crouch*55 + tuckKnee)) },

    // ── Arms ──────────────────────────────────────────────────────────────
    { bone: 'upperarm01.L', rot: aimAt('upperarm01.L', armDirL) },
    { bone: 'upperarm01.R', rot: aimAt('upperarm01.R', armDirR) },
    // Elbow flex on rotX (computed flex axis matches lowerarm.localX).
    { bone: 'lowerarm01.L', rot: rotX(deg(armsUp*10 + tuckElbow)) },
    { bone: 'lowerarm01.R', rot: rotX(deg(armsUp*10 + tuckElbow)) },

    // ── Spine ─────────────────────────────────────────────────────────────
    // Crunch curl across all spine bones in tuck for a real ball shape,
    // small forward lean in crouch, slight back-arch on launch ("hollow→pop").
    { bone: 'spine01', rot: rotX(deg(crouch*5 - launch*6 + tuck*15)) },
    { bone: 'spine02', rot: rotX(deg(crouch*4 - launch*4 + tuck*15)) },
    { bone: 'spine03', rot: rotX(deg(tuck*12)) },
    { bone: 'spine04', rot: rotX(deg(tuck*10)) },
    { bone: 'spine05', rot: rotX(deg(tuck*8)) },

    // ── Head: chin to chest in tuck (spotting the floor) ──────────────────
    { bone: 'neck01', rot: rotX(deg(tuck*30)) },
  ]);
  return d;
}

// Aerial flip angle: 0 → -2π during aerial phase
function flipAngle(t) {
  return -phase(t, 0.30, 0.75) * Math.PI * 2;
}

// Jump height: parabolic arc lifting body above floor during the aerial phase.
// Returns pixel offset (positive = body moves UP on canvas = footY decreases).
function jumpHeight(t) {
  const arc = phase(t, 0.24, 0.35) * (1 - phase(t, 0.72, 0.84));
  return arc * bh * 0.18;   // peak ≈ 18% of body height — realistic backflip clearance
}

// Slow hip twist on non-salto views
let twist = 0;

// ── Render loop ───────────────────────────────────────────────────────────────
// Cycle: 1.4s hold at stand + 2.6s salto = 4s total
const CYCLE_MS = 4200;
let fc=0, fpsTs=performance.now(), fps=0;

// Debug: ?t=0.45 freezes the demo at a specific phase for screenshotting.
// ?flip=0 disables the world flip rotation (always view the body upright).
const _qs = new URLSearchParams(location.search);
const FROZEN_T = _qs.has('t') ? parseFloat(_qs.get('t')) : null;
const FLIP_ON  = _qs.get('flip') !== '0';

function tick(){
  requestAnimationFrame(tick);
  const now=performance.now();
  if(++fc%60===0){ fps=Math.round(fc/((now-fpsTs)/1000)); fc=0; fpsTs=now; }

  // window.__t lets external tools (e.g. GIF capture) override the phase each frame.
  const tOverride = typeof window.__t === 'number' ? window.__t : null;
  const t = tOverride ?? FROZEN_T ?? (now % CYCLE_MS) / CYCLE_MS;

  const deltas = makeSaltoPose(t);
  const rx     = flipAngle(t);   // flip angle for side views

  const t1=performance.now();
  forwardKinematics(model,deltas,boneXforms);
  const mesh=lbs(model,boneXforms,vertBuf);
  const ms=(performance.now()-t1).toFixed(1);

  gl.bindBuffer(gl.ARRAY_BUFFER,vtxBuf);
  gl.bindBuffer(gl.ARRAY_BUFFER,vtxBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER,0,mesh.vertices);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);

  gl.clearColor(0.047,0.047,0.071,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

    // World flip applied once — same body state for all cameras
  setWorldFlip(FLIP_ON ? rx : 0);
  const jh = jumpHeight(t);   // pixels to lift body above floor

  // Grid at world Z=0 (fyTop/fyBot); body starts at bfTop/bfBot (feet at grid), lifts by jh
  gridView(HW*0.5, fyTop,      sc,       -1, 0,           0);
  view    (HW*0.5, bfTop - jh, sc,       -1, 0,           0,    0.88,0.90,0.95);
  gridView(HW*1.5, fyTop,      sc,       -1, Math.PI,     0);
  view    (HW*1.5, bfTop - jh, sc,       -1, Math.PI,     0,    0.95,0.90,0.85);
  gridView(HW*0.5, fyBot,      sc,       -1, Math.PI*0.4, 0);
  view    (HW*0.5, bfBot - jh, sc,       -1, Math.PI*0.4, 0,    0.88,0.95,0.90);
  gridView(HW*1.5, fyBot,      sc*0.65,   1, 0,           0.85);
  view    (HW*1.5, bfBot - jh, sc*0.65,   1, 0,           0.85, 0.92,0.88,0.96);

  const airborne = t > 0.30 && t < 0.74;
  const phaseName = t<0.10?'stand': t<0.22?'crouch': t<0.30?'launch':
                    t<0.62?'tuck':   t<0.72?'open':   t<0.86?'land':  'recover';
  statsEl.textContent=`FK+LBS ${ms} ms · ${fps} fps · ${model.vertCount.toLocaleString()} verts · 163 bones`;
  poseEl.textContent = airborne ? `✈ ${phaseName} (${Math.round(-rx/Math.PI/2*360)}°)` : phaseName;
}

tick();
</script>
