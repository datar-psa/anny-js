<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>anny-js — live pose demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; overflow: hidden; color: #ccc; font: 13px monospace; }
    #status { position: fixed; top: 6px; left: 50%; transform: translateX(-50%); color: #0f0; z-index: 10; }
    #rec { position: fixed; bottom: 30px; right: 12px; z-index: 20; padding: 6px 14px;
           background: #c00; color: #fff; border: none; border-radius: 4px; font: 13px monospace; cursor: pointer; }
    #rec.recording { background: #600; animation: blink 1s step-start infinite; }
    @keyframes blink { 50% { opacity: 0.4; } }
    #cam { position: fixed; top: 0; left: 0; width: 220px; height: 165px; opacity: 0.4; transform: scaleX(-1); z-index: 3; }
    #gl  { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
    #c   { position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; background: transparent; }
  </style>
</head>
<body>
  <div id="status">Initialising…</div>
  <button id="rec">⏺ REC</button>
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="gl"></canvas>
  <canvas id="c"></canvas>

  <script type="module">
    import { PoseLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";
    import {
      loadAnnyModel,
      forwardKinematics, allocBoneTransforms,
      lbs, allocVertexBuffer,
      buildBoneIndex, landmarksToPoseDeltas, assignHands,
    } from "../dist/index.js";

    const W = window.innerWidth, H = window.innerHeight;
    const canvas = document.getElementById("c");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    const video = document.getElementById("cam");
    const statusEl = document.getElementById("status");

    // ── 1. Load Anny model ──────────────────────────────────────────────
    const t0 = performance.now();
    const model = await loadAnnyModel("../assets/anny_model.json", "../assets/anny_model.bin");
    statusEl.textContent = `Anny loaded ${(performance.now()-t0).toFixed(0)} ms — starting MediaPipe…`;

    const boneIndex    = buildBoneIndex(model);
    const boneXforms   = allocBoneTransforms(model.boneCount);
    const vertBuf      = allocVertexBuffer(model);

    // Foot-level offset: Anny's rest mesh may have min Z slightly below 0.
    let minRestZ = 0;
    for (let i = 2; i < model.restVertices.length; i += 3)
      if (model.restVertices[i] < minRestZ) minRestZ = model.restVertices[i];

    // ── 2. MediaPipe Pose + Hand landmarkers ───────────────────────────
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    const [poseLandmarker, handLandmarker] = await Promise.all([
      PoseLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
          delegate: "GPU",
        },
        runningMode: "VIDEO",
        numPoses: 1,
      }),
      HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU",
        },
        runningMode: "VIDEO",
        numHands: 2,
      }),
    ]);
    statusEl.textContent = "MediaPipe ready — requesting camera…";

    // ── 3. Webcam ───────────────────────────────────────────────────────
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    await new Promise(r => video.addEventListener("loadeddata", r, { once: true }));
    statusEl.textContent = "✓ Live — move to drive Anny";

    // ── 4. WebGL setup ─────────────────────────────────────────────────
    const glCanvas = document.getElementById("gl");
    glCanvas.width = W; glCanvas.height = H;
    const gl = glCanvas.getContext("webgl", { alpha: true, antialias: true, depth: true });

    // GPU info
    const dbgExt = gl.getExtension("WEBGL_debug_renderer_info");
    const gpuName = dbgExt ? gl.getParameter(dbgExt.UNMASKED_RENDERER_WEBGL) : "unknown";
    console.log("[GPU]", gpuName);
    statusEl.textContent = `✓ Live — GPU: ${gpuName.substring(0,40)}`;

    const compile = (type, src) => {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
        console.error("Shader compile error:", gl.getShaderInfoLog(s));
      return s;
    };

    // ── Body shader — world rotation + camera + face-normal lighting ───────────
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, `
      attribute vec3 aPos;
      uniform float uSc,uCx,uFy,uXs,uCY,uSY,uCX,uSX,uWX,uWS;
      uniform vec2 uVP;
      varying vec3 vViewPos;
      varying float vH,vD;
      void main(){
        float py=aPos.y*uWX-aPos.z*uWS, pz=aPos.y*uWS+aPos.z*uWX;
        float rx=aPos.x*uCY-py*uSY, ry=aPos.x*uSY+py*uCY;
        float rz=ry*uSX+pz*uCX, rd=ry*uCX-pz*uSX;
        float sx=uCx+uXs*rx*uSc, sy=uFy-rz*uSc;
        vViewPos=vec3(sx,sy,rd*uSc); vH=pz; vD=rd;
        gl_Position=vec4(sx/uVP.x*2.-1.,1.-sy/uVP.y*2.,rd/5.,1.);
      }`));
    const hasD = !!gl.getExtension("OES_standard_derivatives");
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, hasD ? `
      #extension GL_OES_standard_derivatives : enable
      precision mediump float;
      uniform vec4 uCol;
      varying vec3 vViewPos; varying float vH,vD;
      void main(){
        vec3 n=normalize(cross(dFdx(vViewPos),dFdy(vViewPos)));
        float key =max(dot(n,normalize(vec3( 0.3,-0.8, 0.6))),0.);
        float fill=max(dot(n,normalize(vec3( 0.8, 0.2, 0.3))),0.);
        float rim =max(dot(n,normalize(vec3(-0.2, 0.6,-0.8))),0.);
        gl_FragColor=vec4(uCol.rgb*(0.28+0.52*key+0.14*fill+0.06*rim*rim),1.);
      }` : `
      precision mediump float;
      uniform vec4 uCol; varying float vH,vD;
      void main(){
        float t=0.35+0.65*clamp(vH/1.8,0.,1.);
        float f=0.50+0.50*clamp(-vD*1.4,0.,1.);
        gl_FragColor=vec4(uCol.rgb*(t*.5+f*.5),1.);
      }`));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
      console.error("Body shader link error:", gl.getProgramInfoLog(prog));
    gl.useProgram(prog);

    const aPos = gl.getAttribLocation(prog, "aPos");
    const uLocs = {};
    for (const n of ["uSc","uCx","uFy","uXs","uCY","uSY","uCX","uSX","uWX","uWS","uVP","uCol"])
      uLocs[n] = gl.getUniformLocation(prog, n);

    // ── Grid shader — camera only (no world rotation, floor is static) ─────────
    const gridProg = gl.createProgram();
    gl.attachShader(gridProg, compile(gl.VERTEX_SHADER, `
      attribute vec3 aPos;
      uniform float uSc,uCx,uFy,uXs,uCY,uSY,uCX,uSX; uniform vec2 uVP;
      void main(){
        float rx=aPos.x*uCY-aPos.y*uSY, ry=aPos.x*uSY+aPos.y*uCY;
        float rz=ry*uSX+aPos.z*uCX, rd=ry*uCX-aPos.z*uSX;
        gl_Position=vec4((uCx+uXs*rx*uSc)/uVP.x*2.-1.,1.-(uFy-rz*uSc)/uVP.y*2.,rd/5.+.001,1.);
      }`));
    gl.attachShader(gridProg, compile(gl.FRAGMENT_SHADER,
      "precision mediump float; void main(){gl_FragColor=vec4(.28,.28,.34,.5);}"));
    gl.linkProgram(gridProg);
    const gAPos = gl.getAttribLocation(gridProg, "aPos");
    const gU = {};
    for (const n of ["uSc","uCx","uFy","uXs","uCY","uSY","uCX","uSX","uVP"])
      gU[n] = gl.getUniformLocation(gridProg, n);

    const gridVerts = []; const gr = 1.4, gs = gr*2/20;
    for (let i = 0; i <= 20; i++){
      const v = -gr+i*gs;
      gridVerts.push(v,-gr,0, v,gr,0, -gr,v,0, gr,v,0);
    }
    const gridBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, gridBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(gridVerts), gl.STATIC_DRAW);

    // ── Shared buffers ─────────────────────────────────────────────────────────
    const idxBuf = gl.createBuffer();
    const faces16 = new Uint16Array(model.faces.length);
    for (let i = 0; i < model.faces.length; i++) faces16[i] = model.faces[i];
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, faces16, gl.STATIC_DRAW);

    const vtxBufGL = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vtxBufGL);
    gl.bufferData(gl.ARRAY_BUFFER, model.vertCount * 12, gl.DYNAMIC_DRAW);

    gl.enable(gl.DEPTH_TEST); gl.enable(gl.CULL_FACE);
    gl.cullFace(gl.BACK); gl.frontFace(gl.CCW);
    gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    // World twist (hip yaw) — set once per frame, shared by all body views
    let _wx=1, _ws=0;
    function setWorldTwist(a){ _wx=Math.cos(a); _ws=Math.sin(a); }

    function applyProj(locs, cx,fy,sc,xs,camY,camX){
      gl.uniform1f(locs.uSc,sc); gl.uniform1f(locs.uCx,cx); gl.uniform1f(locs.uFy,fy);
      gl.uniform1f(locs.uXs,xs);
      gl.uniform1f(locs.uCY,Math.cos(camY)); gl.uniform1f(locs.uSY,Math.sin(camY));
      gl.uniform1f(locs.uCX,Math.cos(camX)); gl.uniform1f(locs.uSX,Math.sin(camX));
      gl.uniform2f(locs.uVP,W,H);
    }

    function drawGrid(cx,fy,sc,xs,camY,camX){
      gl.useProgram(gridProg);
      applyProj(gU,cx,fy,sc,xs,camY,camX);
      gl.bindBuffer(gl.ARRAY_BUFFER,gridBuf);
      gl.vertexAttribPointer(gAPos,3,gl.FLOAT,false,0,0);
      gl.enableVertexAttribArray(gAPos);
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,null);
      gl.drawArrays(gl.LINES,0,gridVerts.length/3);
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
    }

    function glView(cx,fy,sc,xs,camY,camX,r,g,b){
      gl.useProgram(prog);
      gl.uniform1f(uLocs.uWX,_wx); gl.uniform1f(uLocs.uWS,_ws);
      applyProj(uLocs,cx,fy,sc,xs,camY,camX);
      gl.uniform4f(uLocs.uCol,r,g,b,1);
      gl.bindBuffer(gl.ARRAY_BUFFER,vtxBufGL);
      gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);
      gl.enableVertexAttribArray(aPos);
      gl.drawElements(gl.TRIANGLES,model.faceCount*3,gl.UNSIGNED_SHORT,0);
    }

    // ── 5. Render loop ──────────────────────────────────────────────────
    let lastImageLm = null;   // most-recent pose 2D landmarks (image-space)
    let smoothImageLm = null;
    let smoothWorldLm = null; // smoothed pose worldLandmarks
    let smoothLeftHand = null, smoothRightHand = null;
    let lastHandRes = null;   // reused on frames where hand detection is skipped
    let handFrame = 0;        // counter for alternating-frame hand detection
    let lastTs = -1;
    let frameCount = 0, fpsTs = performance.now(), fps = 0;

    // EMA smoothing factors
    const LM_S = 0.5;        // pose body — responsive, light jitter damping
    const HAND_S = 0.6;      // hand — slightly more responsive (fingers move fast)

    // Smoothed position/scale (image-space, for screen placement)
    let sCx = W / 2, sScale = 280, sFootY = H * 0.88;
    const SMOOTH = 0.25;

    // EMA smooth a landmark array (mutates `acc`, allocates first time only).
    function smoothLandmarks(acc, fresh, alpha) {
      if (!acc) return fresh.map(lm => ({ ...lm }));
      for (let i = 0; i < fresh.length; i++) {
        const a = acc[i], f = fresh[i];
        a.x += (f.x - a.x) * alpha;
        a.y += (f.y - a.y) * alpha;
        a.z = (a.z ?? 0) + ((f.z ?? 0) - (a.z ?? 0)) * alpha;
        a.visibility = (a.visibility ?? 1) + ((f.visibility ?? 1) - (a.visibility ?? 1)) * alpha;
      }
      return acc;
    }

    let lastFrame = 0;
    function tick() {
      requestAnimationFrame(tick);
      const now = performance.now();
      if (now - lastFrame < 16) return;
      lastFrame = now;

      // ── Detect (VIDEO mode requires monotonically advancing timestamps) ──
      // Pose every frame; hand every other frame — hand inference is ~half the
      // total MediaPipe budget on integrated GPU, and finger motion at 15Hz
      // looks fine after EMA smoothing.
      if (video.readyState >= 2 && now !== lastTs) {
        lastTs = now;
        const poseRes = poseLandmarker.detectForVideo(video, now);
        if ((handFrame++ & 1) === 0) {
          lastHandRes = handLandmarker.detectForVideo(video, now);
        }

        if (poseRes.landmarks.length > 0) {
          lastImageLm   = poseRes.landmarks[0];
          smoothImageLm = smoothLandmarks(smoothImageLm, lastImageLm, LM_S);
          smoothWorldLm = smoothLandmarks(smoothWorldLm, poseRes.worldLandmarks[0], LM_S);

          const hr = lastHandRes ?? { landmarks: [], worldLandmarks: [] };
          const { leftHand: lH, rightHand: rH } = assignHands(
            hr.landmarks, hr.worldLandmarks, smoothImageLm,
          );
          smoothLeftHand  = lH ? smoothLandmarks(smoothLeftHand,  lH, HAND_S) : null;
          smoothRightHand = rH ? smoothLandmarks(smoothRightHand, rH, HAND_S) : null;
        }
      }

      // FPS counter
      frameCount++;
      if (now - fpsTs >= 1000) {
        fps = frameCount; frameCount = 0; fpsTs = now;
      }

      // Clear
      ctx.fillStyle = "#0a0a0f";
      ctx.fillRect(0, 0, W, H);

      if (!smoothWorldLm) {
        ctx.fillStyle = "#555";
        ctx.font = "18px monospace";
        ctx.fillText("Stand in front of the camera…", W/2 - 160, H/2);
        return;
      }

      // ── Pose deltas from world landmarks (+ hands) ──
      const t1 = performance.now();
      const deltas = landmarksToPoseDeltas({
        pose:      smoothWorldLm,
        leftHand:  smoothLeftHand  ?? undefined,
        rightHand: smoothRightHand ?? undefined,
      }, model, boneIndex);
      forwardKinematics(model, deltas, boneXforms);
      const mesh = lbs(model, boneXforms, vertBuf);
      const poseMs = (performance.now() - t1).toFixed(1);

      // ── Screen position from image-space pose ──
      const lS = smoothImageLm[11], rS = smoothImageLm[12];
      const torsoW = Math.abs(lS.x - rS.x);
      const rawScale = torsoW > 0.02 ? (torsoW * W) / 0.42 : sScale;
      const shoulderY = ((lS.y + rS.y) / 2) * H;
      const rawFootY  = shoulderY + 1.35 * rawScale;
      const clampedScale = rawFootY > H - 20 ? (H - 20 - shoulderY) / 1.35 : rawScale;

      sCx    += (((lS.x + rS.x) / 2) * W   - sCx)    * SMOOTH;
      sScale += (clampedScale               - sScale) * SMOOTH;
      sFootY += (shoulderY + 1.35 * sScale  - sFootY) * SMOOTH;

      // ── WebGL: 4 views — 4 draw calls total ────────────────────────────
      const HW = W / 2, HH = H / 2;
      const vs = Math.min(sScale * 0.42, HH * 0.82 / 1.7);
      const bodyH = 1.7 * vs;

      // Upload posed vertices
      gl.bindBuffer(gl.ARRAY_BUFFER, vtxBufGL);
      gl.bufferSubData(gl.ARRAY_BUFFER, 0, mesh.vertices);
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);

      gl.clearColor(0.047, 0.047, 0.071, 1);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

      // Torso twist is now baked into spine01's rotation by the pose driver —
      // no world rotation needed; cameras have fixed base angles.
      setWorldTwist(0);
      const bfo = minRestZ * vs;   // foot-level correction
      const fT = HH*0.1+bodyH+bfo, fB = HH+HH*0.1+bodyH+bfo;

      drawGrid(HW*0.5, HH*0.1+bodyH,     vs,      -1, 0,           0);
      glView  (HW*0.5, fT,                vs,      -1, 0,           0,    0.88,0.90,0.95); // FRONT
      drawGrid(HW*1.5, HH*0.1+bodyH,     vs,      -1, Math.PI,     0);
      glView  (HW*1.5, fT,                vs,      -1, Math.PI,     0,    0.95,0.90,0.85); // BACK
      drawGrid(HW*0.5, HH+HH*0.1+bodyH,  vs,      -1, Math.PI*0.35,0);
      glView  (HW*0.5, fB,                vs,      -1, Math.PI*0.35,0,    0.88,0.95,0.90); // 3/4
      drawGrid(HW*1.5, HH+HH*0.55,       vs*0.6,   1, 0,           0.85);
      glView  (HW*1.5, HH+HH*0.55+bfo*0.6, vs*0.6, 1, 0,           0.85, 0.92,0.88,0.96); // ABOVE

      // ── 2D canvas: background + dividers + labels only ────────────────
      ctx.fillStyle = "transparent";
      ctx.clearRect(0, 0, W, H);

      // Dividing lines
      ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(HW, 0); ctx.lineTo(HW, H);
      ctx.moveTo(0, HH); ctx.lineTo(W, HH);
      ctx.stroke();

      const label = (txt, qx, qy) => {
        ctx.fillStyle = "rgba(255,255,255,0.45)";
        ctx.font = "11px monospace";
        ctx.fillText(txt, qx + 8, qy + 16);
      };
      label("FRONT", 0, 0); label("BACK", HW, 0);
      label("3/4",   0, HH); label("ABOVE", HW, HH);

      // ── Overlay: mini landmark skeleton (for debugging) ──
      const LW = 160, LH = 120;
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 1.5;
      const lx = (i) => 8 + lastImageLm[i].x * LW;
      const ly = (i) => 8 + lastImageLm[i].y * LH;
      const bone = (a, b) => {
        ctx.beginPath(); ctx.moveTo(lx(a), ly(a)); ctx.lineTo(lx(b), ly(b)); ctx.stroke();
      };
      ctx.strokeStyle = "#0f0";
      // torso
      bone(11,12); bone(11,23); bone(12,24); bone(23,24);
      // arms
      bone(11,13); bone(13,15); bone(12,14); bone(14,16);
      // legs
      bone(23,25); bone(25,27); bone(24,26); bone(26,28);
      ctx.globalAlpha = 1;
      ctx.restore();

      // ── Stats ──
      ctx.fillStyle = "#4f4";
      ctx.font = "12px monospace";
      const hands = (smoothLeftHand ? "L" : "-") + (smoothRightHand ? "R" : "-");
      ctx.fillText(`FK+LBS ${poseMs} ms   ${fps} fps   hands:${hands}`, 10, H - 10);
    }

    tick();

    // ── Canvas recording ────────────────────────────────────────────────
    // Captures the WebGL canvas to a WebM file — no screen capture needed.
    const recBtn = document.getElementById("rec");
    let recorder = null, recChunks = [];

    recBtn.addEventListener("click", () => {
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        return;
      }
      // Combine WebGL canvas + 2D overlay into one stream
      const streams = [glCanvas.captureStream(30), canvas.captureStream(30)];
      // Merge on an offscreen canvas
      const merge = document.createElement("canvas");
      merge.width = W; merge.height = H;
      const mctx = merge.getContext("2d");
      const mergeStream = merge.captureStream(30);
      (function drawMerge() {
        if (!recorder || recorder.state !== "recording") return;
        mctx.drawImage(glCanvas, 0, 0);
        mctx.drawImage(canvas, 0, 0);
        requestAnimationFrame(drawMerge);
      })();

      recChunks = [];
      recorder = new MediaRecorder(mergeStream, { mimeType: "video/webm;codecs=vp9", videoBitsPerSecond: 8_000_000 });
      recorder.ondataavailable = e => { if (e.data.size) recChunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(recChunks, { type: "video/webm" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = `anny-${Date.now()}.webm`; a.click();
        URL.revokeObjectURL(url);
        recBtn.textContent = "⏺ REC";
        recBtn.classList.remove("recording");
      };
      recorder.start();
      requestAnimationFrame(drawMerge);
      recBtn.textContent = "⏹ STOP";
      recBtn.classList.add("recording");
    });
  </script>
</body>
</html>
